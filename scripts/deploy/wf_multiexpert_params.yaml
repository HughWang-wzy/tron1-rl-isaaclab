WFMultiExpertCfg:
  loop_frequency: 500
  joint_names:
    - "abad_L_Joint"
    - "hip_L_Joint"
    - "knee_L_Joint"
    - "wheel_L_Joint"
    - "abad_R_Joint"
    - "hip_R_Joint"
    - "knee_R_Joint"
    - "wheel_R_Joint"

  init_state:
    default_joint_angle:
      abad_L_Joint: 0.0
      hip_L_Joint: 0.0
      knee_L_Joint: 0.0
      wheel_L_Joint: 0.0
      abad_R_Joint: 0.0
      hip_R_Joint: 0.0
      knee_R_Joint: 0.0
      wheel_R_Joint: 0.0

  control:
    stiffness: 42.0
    damping: 2.5
    wheel_joint_damping: 0.8
    wheel_joint_torque_limit: 40
    action_scale_pos: 0.5
    decimation: 10
    user_torque_limit: 80

  normalization:
    clip_scales:
      clip_observations: 100.0
      clip_actions: 100.0
    obs_scales:
      lin_vel: 2.0
      ang_vel: 0.25
      dof_pos: 1.0
      dof_vel: 0.05

  size:
    actions_size: 8
    observations_size: 28
    commands_size: 3
    jump_commands_size: 3
    gait_commands_size: 5
    env_group_size: 1
    obs_history_length: 10
    jointpos_idxs: [0, 1, 2, 4, 5, 6]
    encoder_output_size: 3

  stand_mode:
    stand_duration: 1.0

  imu_orientation_offset:
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

  user_cmd_scales:
    lin_vel_x: 1.5
    lin_vel_y: 1.0
    ang_vel_yaw: 0.5

  expert:
    default_mode: jump
    auto_return_to_default: true
    jump_env_group: 0.0
    gait_env_group: 1.0

  gait:
    frequency: 2.0
    offset: 0.5
    duration: 0.5
    swing_height: 0.15
    standing_height: 0.8

  jump:
    trigger_button_index: 0
    expert_toggle_button_index: 1
    hold_seconds: 1.0
    standing_height: 0.8
    delta_height: 0.35

  model:
    use_single_onnx: false
